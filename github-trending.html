  --bg-surface: oklch(0.18 0.012 260);
  --bg-elevated: oklch(0.21 0.012 260);
  --bg-hover: oklch(0.24 0.015 260);
  --text-primary: oklch(0.92 0.005 260);
  --text-secondary: oklch(0.68 0.015 260);
  --text-tertiary: oklch(0.48 0.015 260);
  --accent-weekly: oklch(0.72 0.18 40);
  --accent-daily: oklch(0.68 0.16 200);
  --accent-rising: oklch(0.7 0.17 340);
  --accent-glow-weekly: oklch(0.72 0.18 40 / 0.15);
  --accent-glow-daily: oklch(0.68 0.16 200 / 0.15);
  --accent-glow-rising: oklch(0.7 0.17 340 / 0.12);
  --border: oklch(0.28 0.015 260);
  --rank-gold: oklch(0.78 0.16 85);
  --rank-silver: oklch(0.72 0.04 220);
  --rank-bronze: oklch(0.65 0.1 55);
  --lang-ts: oklch(0.65 0.14 230);
  --lang-py: oklch(0.65 0.14 210);
  --lang-rs: oklch(0.65 0.14 30);
  --lang-go: oklch(0.65 0.14 190);
  --lang-js: oklch(0.68 0.16 85);
  --lang-cpp: oklch(0.65 0.14 270);
  --radius: 6px;
}

html { background: var(--bg-base); color: var(--text-primary); font-family: 'DM Sans', 'Noto Sans SC', system-ui, sans-serif; scroll-behavior: smooth; }

body { min-height: 100vh; }

/* Header */
.header {
  padding: clamp(24px, 5vw, 48px) clamp(16px, 5vw, 48px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  background: oklch(0.15 0.012 260 / 0.85);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
}

.header-inner {

  display: flex; align-items: baseline; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}

.logo-group { display: flex; align-items: baseline; gap: 10px; }

}

.logo-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(14px, 2.5vw, 16px);
  font-weight: 600;
  letter-spacing: -0.5px;
}

.logo-sub {
  font-size: clamp(11px, 1.8vw, 13px);
  color: var(--text-tertiary);
  font-weight: 300;
}

.date-badge {
  font-size: 13px; color: var(--text-secondary);
  font-weight: 400;
}

/* Tabs */
.tab-bar {
  max-width: 1200px; margin: 0 auto;
  display: flex; gap: 0;
  padding: 0 clamp(16px, 5vw, 48px);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}

.tab-btn {
  background: none; border: none; color: var(--text-tertiary);
  font-family: inherit; font-size: 14px; font-weight: 500;
  padding: 14px 24px; cursor: pointer;
  position: relative; transition: color 0.2s;
  white-space: nowrap;
  letter-spacing: 0.3px;
}

.tab-btn:hover { color: var(--text-secondary); }

.tab-btn.active { color: var(--text-primary); }

.tab-btn.active::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
  height: 2px; border-radius: 1px;
}

.tab-btn[data-tab="weekly"].active::after { background: var(--accent-weekly); }
.tab-btn[data-tab="daily"].active::after { background: var(--accent-daily); }
.tab-btn[data-tab="rising"].active::after { background: var(--accent-rising); }

.tab-badge {
  font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px;
  margin-left: 8px; vertical-align: middle;
}

.tab-badge.weekly { background: var(--accent-glow-weekly); color: var(--accent-weekly); }
.tab-badge.daily { background: var(--accent-glow-daily); color: var(--accent-daily); }
.tab-badge.rising { background: var(--accent-glow-rising); color: var(--accent-rising); }

/* Content */
.content {
  max-width: 1200px; margin: 0 auto;
  padding: clamp(16px, 3vw, 32px) clamp(16px, 5vw, 48px) clamp(48px, 8vw, 80px);
}

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Stats row */
.stats-row {
  display: flex; gap: 24px; margin-bottom: 32px;
  flex-wrap: wrap;
}

.stat-card {
  background: var(--bg-surface); border-radius: var(--radius);
  padding: 16px 20px; flex: 1; min-width: 160px;
  border: 1px solid var(--border);
}

.stat-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
.stat-value { font-size: 24px; font-weight: 700; margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
.stat-card.weekly .stat-value { color: var(--accent-weekly); }
.stat-card.daily .stat-value { color: var(--accent-daily); }
.stat-card.rising .stat-value { color: var(--accent-rising); }

/* Repo list */
.repo-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }

.repo-item {
  background: var(--bg-surface);
  padding: 16px 20px;
  display: grid;
  grid-template-columns: 48px 1fr auto;
  gap: 16px;
  align-items: start;
  transition: background 0.15s;
}

.repo-item:hover { background: var(--bg-hover); }

.repo-rank {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px; font-weight: 700; text-align: center;
  line-height: 1; padding-top: 2px;
}

.rank-1 { color: var(--rank-gold); }
.rank-2 { color: var(--rank-silver); }
.rank-3 { color: var(--rank-bronze); }
.rank-other { color: var(--text-tertiary); }

.repo-rank .medal { font-size: 20px; display: block; }
.repo-rank .num { font-size: 14px; }

.repo-info { min-width: 0; }

.repo-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; font-weight: 600;
  color: var(--text-primary);
  text-decoration: none;
  word-break: break-all;
}

.repo-name:hover { text-decoration: underline; }

.repo-desc-en {
  font-size: 13px; color: var(--text-secondary);
  margin-top: 4px; line-height: 1.5;
}

.repo-desc-cn {
  font-size: 13px; color: var(--text-secondary);
  margin-top: 6px; line-height: 1.6;
  font-weight: 400;
  padding: 5px 10px;
  border-left: 3px solid var(--accent-rising);
  background: oklch(0.22 0.012 260);
  border-radius: 0 4px 4px 0;
}

.repo-desc-cn::before {
  content: "中文翻译";
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-tertiary);
  background: oklch(0.25 0.012 260);
  padding: 1px 6px;
  border-radius: 3px;
  margin-right: 6px;
  vertical-align: middle;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.repo-meta {
  display: flex; align-items: center; gap: 12px; margin-top: 8px;
  flex-wrap: wrap;
}

.repo-lang {
  font-size: 11px; color: var(--text-tertiary);
  display: flex; align-items: center; gap: 5px;
}

.lang-dot {
  width: 8px; height: 8px; border-radius: 50%; display: inline-block;
}

.repo-stars {
  font-size: 11px; color: var(--text-tertiary);
  font-family: 'JetBrains Mono', monospace;
}

.repo-action {
  display: flex; align-items: center; gap: 12px;
}

.btn-star {
  background: var(--bg-elevated); border: 1px solid var(--border);
  color: var(--text-secondary); font-size: 12px; font-weight: 500;
  padding: 6px 14px; border-radius: var(--radius); cursor: pointer;
  font-family: inherit; transition: all 0.15s;
  white-space: nowrap;
}

.btn-star:hover {
  background: var(--bg-hover); border-color: oklch(0.4 0.015 260);
}

.btn-visit {
  background: none; border: 1px solid var(--border);
  color: var(--text-tertiary); font-size: 12px;
  padding: 6px 12px; border-radius: var(--radius); cursor: pointer;
  font-family: inherit; transition: all 0.15s;
  white-space: nowrap;
}

.btn-visit:hover { color: var(--text-primary); border-color: oklch(0.4 0.015 260); }

/* Footer */
.footer {
  text-align: center; padding: 32px 16px;
  color: var(--text-tertiary); font-size: 12px;
  border-top: 1px solid var(--border);
}

.footer a { color: var(--text-secondary); text-decoration: none; }
.footer a:hover { text-decoration: underline; }

/* Loading skeleton */
.skeleton {
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.skeleton-line {
  height: 14px; background: var(--bg-elevated); border-radius: 4px;
  margin-bottom: 8px;
}

.skeleton-line.short { width: 60%; }
.skeleton-line.medium { width: 80%; }

/* Responsive */
@media (max-width: 640px) {
  .repo-item { grid-template-columns: 36px 1fr; padding: 14px 14px; gap: 10px; }
  .repo-action { grid-column: 1 / -1; justify-content: flex-start; padding-top: 4px; }
  .repo-rank { font-size: 14px; }
  .tab-btn { padding: 12px 16px; font-size: 13px; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>

function getLangColor(lang) {
  const map = {
    'TypeScript': 'var(--lang-ts)',
    'Python': 'var(--lang-py)',
    'Rust': 'var(--lang-rs)',
    'Go': 'var(--lang-go)',
    'JavaScript': 'var(--lang-js)',
    'C++': 'var(--lang-cpp)',
    'Markdown': 'var(--text-secondary)'
  };
  return map[lang] || 'var(--text-tertiary)';
}

function getRankClass(rank) {
  if (rank === 1) return 'rank-1';
  if (rank === 2) return 'rank-2';
  if (rank === 3) return 'rank-3';
  return 'rank-other';
}

function getRankDisplay(rank) {
  if (rank === 1) return '<span class="medal">🥇</span>';
  if (rank === 2) return '<span class="medal">🥈</span>';
  if (rank === 3) return '<span class="medal">🥉</span>';
  return `<span class="num">${String(rank).padStart(2,'0')}</span>`;
}

function renderRepoItem(repo) {
  return `
    <div class="repo-item">
      <div class="repo-rank ${getRankClass(repo.rank)}">${getRankDisplay(repo.rank)}</div>
      <div class="repo-info">
        <a class="repo-name" href="${repo.url}" target="_blank" rel="noopener">${repo.name}</a>
        <div class="repo-desc-en">${repo.descEn}</div>
        <div class="repo-desc-cn">${repo.descCn}</div>
        <div class="repo-meta">
          <span class="repo-lang"><span class="lang-dot" style="background:${getLangColor(repo.lang)}"></span>${repo.lang}</span>
          <span class="repo-stars">⭐ ${repo.stars} ${repo.starsLabel}</span>
          ${repo.growth ? `<span class="repo-stars" style="color:var(--accent-rising)">📈 ${repo.growth}</span>` : ''}
        </div>
      </div>
      <div class="repo-action">
        <a href="${repo.url}" target="_blank" rel="noopener" class="btn-visit">查看 →</a>
      </div>
    </div>
  `;
}

function renderList(containerId, data) {
  const container = document.getElementById(containerId);
  container.innerHTML = data.map(renderRepoItem).join('');
}

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  renderList('weekly-list', WEEKLY_DATA);
  renderList('daily-list', DAILY_DATA);
  renderList('rising-list', RISING_DATA);

  // Tab switching
  const tabs = document.querySelectorAll('.tab-btn');
  const panels = document.querySelectorAll('.tab-panel');

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      const target = tab.dataset.tab;
      tabs.forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected', 'false'); });
      panels.forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      tab.setAttribute('aria-selected', 'true');
      document.getElementById(`panel-${target}`).classList.add('active');
    });
  });

  // Set date
  const now = new Date();
  document.getElementById('dateBadge').textContent =
    `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
});
</script>
